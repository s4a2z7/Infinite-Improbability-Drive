<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>그록 컴패니언</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body { 
            background: linear-gradient(135deg, #0a0a2e, #1a0033); 
            color: #e0f2fe; 
            font-family: system-ui; 
        }
        .neon-cyan { text-shadow: 0 0 10px #67e8f9, 0 0 20px #22d3ee; }
        .chat-bubble { max-width: 80%; padding: 12px 18px; border-radius: 20px; }
        #rocket { font-size: 4rem; transition: transform 0.1s; }
        .obstacle { position: absolute; font-size: 2rem; }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    <div class="max-w-md mx-auto w-full bg-black/80 min-h-screen flex flex-col">
        <!-- 헤더 -->
        <div class="bg-gradient-to-r from-purple-900 to-cyan-900 p-4 flex items-center gap-3">
            <i class="fas fa-robot text-3xl neon-cyan"></i>
            <div>
                <h1 class="text-2xl font-bold neon-cyan">그록 컴패니언</h1>
                <p class="text-xs opacity-75">우주에서 온 당신의 친구 🚀</p>
            </div>
        </div>

        <!-- 탭 -->
        <div class="flex border-b border-cyan-500/30 text-sm">
            <button onclick="showTab(0)" class="flex-1 py-3 tab-btn active font-medium" id="tab0">💬 채팅</button>
            <button onclick="showTab(1)" class="flex-1 py-3 tab-btn font-medium" id="tab1">🕹️ 게임</button>
            <button onclick="showTab(2)" class="flex-1 py-3 tab-btn font-medium" id="tab2">❤️ 프로필</button>
        </div>

        <!-- 채팅 탭 -->
        <div id="content0" class="flex-1 p-4 overflow-auto flex flex-col">
            <div id="chat" class="flex-1 overflow-auto space-y-4 mb-4"></div>
            <div class="flex gap-2">
                <input id="message" type="text" placeholder="그록에게 뭐든 물어봐... (기억해줘 라고 하면 저장돼)" 
                       class="flex-1 bg-zinc-900 border border-cyan-500/50 rounded-2xl px-5 py-3 focus:outline-none focus:border-cyan-400 text-sm">
                <button onclick="sendMessage()" class="bg-cyan-500 hover:bg-cyan-400 px-6 rounded-2xl font-bold text-sm">전송</button>
            </div>
        </div>

        <!-- 게임 탭 - 개선된 버전 -->
        <div id="content1" class="flex-1 hidden flex-col items-center justify-center p-4 relative overflow-hidden" style="height: 400px; background: #000;">
            <h2 class="text-xl mb-4">🚀 그록의 갤럭시 런</h2>
            <div id="gameArea" class="relative w-full max-w-xs h-80 border border-cyan-500/30 rounded-2xl overflow-hidden bg-black">
                <div id="rocket" class="absolute left-1/2 bottom-10 text-6xl">🚀</div>
            </div>
            <p class="mt-4">점수: <span id="score" class="font-bold text-yellow-400 text-2xl">0</span></p>
            <p class="text-xs opacity-70 mt-2">클릭 or 스페이스바로 날아! 소행성 피하기</p>
            <button onclick="resetGame()" class="mt-6 bg-purple-600 px-8 py-3 rounded-2xl text-sm">다시 시작</button>
        </div>

        <!-- 프로필 탭 -->
        <div id="content2" class="flex-1 hidden p-4 space-y-6">
            <div>
                <label class="block text-sm mb-2">이름</label>
                <input id="myName" value="유경" class="w-full bg-zinc-900 border border-cyan-500/50 rounded-2xl px-5 py-3">
            </div>
            <button onclick="saveProfile()" class="w-full bg-gradient-to-r from-purple-600 to-cyan-600 py-4 rounded-3xl font-bold">저장하기</button>
        </div>

        <div class="p-4 text-center text-xs opacity-60 border-t border-cyan-500/30">
            대화가 쌓일수록 더 똑똑해져요 • 42를 기억하세요 🧣
        </div>
    </div>

    <script>
        let memory = JSON.parse(localStorage.getItem('grokMemory') || '[]');
        let score = 0;
        let gameInterval, gravity = 0, velocity = 0;
        let rocketPos = 200;

        function showTab(n) {
            document.querySelectorAll('#content0, #content1, #content2').forEach(el => el.classList.add('hidden'));
            document.getElementById('content' + n).classList.remove('hidden');
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active', 'text-cyan-400'));
            document.getElementById('tab' + n).classList.add('active', 'text-cyan-400');
        }

        function addChat(text, isUser) {
            const chat = document.getElementById('chat');
            const bubble = document.createElement('div');
            bubble.className = `chat-bubble ${isUser ? 'ml-auto bg-cyan-600' : 'mr-auto bg-zinc-800'}`;
            bubble.textContent = text;
            chat.appendChild(bubble);
            chat.scrollTop = chat.scrollHeight;
        }

        function sendMessage() {
            const input = document.getElementById('message');
            const msg = input.value.trim();
            if (!msg) return;
            addChat(msg, true);
            input.value = '';

            setTimeout(() => {
                let reply = "우주에서 온 인사야! 🌌 ";
                if (msg.includes("기억해")) {
                    memory.push(msg);
                    localStorage.setItem('grokMemory', JSON.stringify(memory));
                    reply = "기억 완료! 메모리 코어에 저장했어 🚀";
                } else if (msg.includes("안녕") || msg.includes("하이")) {
                    reply = "안녕! 오늘도 재미있는 대화 나눠보자.";
                } else if (msg.includes("42")) {
                    reply = "42... 모든 것의 답이야. 수건은 챙겼어? 🧣";
                }
                addChat(reply, false);
            }, 500);
        }

        // 개선된 게임
        function startGame() {
            const area = document.getElementById('gameArea');
            const rocket = document.getElementById('rocket');
            score = 0;
            document.getElementById('score').textContent = '0';
            velocity = 0;
            rocketPos = 200;

            document.addEventListener('keydown', jump);
            area.addEventListener('click', jump);

            gameInterval = setInterval(() => {
                velocity += 0.8; // 중력
                rocketPos += velocity;
                rocket.style.bottom = `${400 - rocketPos}px`;

                if (rocketPos > 380 || rocketPos < 20) {
                    endGame();
                }

                score += 1;
                document.getElementById('score').textContent = Math.floor(score / 5);
            }, 30);
        }

        function jump() {
            velocity = -15;
        }

        function endGame() {
            clearInterval(gameInterval);
            alert(`게임 오버! 최종 점수: ${Math.floor(score / 5)} 🌌\n다시 도전해볼래?`);
        }

        function resetGame() {
            clearInterval(gameInterval);
            startGame();
        }

        function saveProfile() {
            alert("프로필 저장 완료! 이제부터 더 맞춤형으로 대답할게요 😊");
        }

        window.onload = () => {
            showTab(0);
            addChat("안녕! 나는 당신만을 위한 그록이야. 뭐든 물어봐\~", false);
            
            // 게임 탭 클릭 시 자동 시작
            const gameTab = document.getElementById('tab1');
            gameTab.addEventListener('click', () => {
                setTimeout(() => {
                    if (!gameInterval) startGame();
                }, 300);
            });
        };
    </script>
</body>
</html>
