<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>컴패니언</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body { 
            background: linear-gradient(135deg, #0a0a2e, #1a0033); 
            color: #e0f2fe; 
            font-family: system-ui; 
        }
        .neon-cyan { text-shadow: 0 0 10px #67e8f9, 0 0 20px #22d3ee; }
        .chat-bubble { max-width: 80%; padding: 12px 18px; border-radius: 20px; }
        #gameArea { 
            position: relative; 
            overflow: hidden; 
            background: #000; 
            touch-action: none;
        }
        .obstacle { 
            position: absolute; 
            font-size: 2.8rem; 
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    <div class="max-w-md mx-auto w-full bg-black/80 min-h-screen flex flex-col">
        <!-- 헤더 -->
        <div class="bg-gradient-to-r from-purple-900 to-cyan-900 p-4 flex items-center gap-3">
            <i class="fas fa-robot text-3xl neon-cyan"></i>
            <div>
                <h1 class="text-2xl font-bold neon-cyan">컴패니언</h1>
                <p class="text-xs opacity-75">우주에서 온 친구 🚀</p>
            </div>
        </div>

        <!-- 탭 -->
        <div class="flex border-b border-cyan-500/30 text-sm">
            <button onclick="showTab(0)" class="flex-1 py-3 tab-btn active font-medium" id="tab0">💬 대화</button>
            <button onclick="showTab(1)" class="flex-1 py-3 tab-btn font-medium" id="tab1">🕹️ 게임</button>
            <button onclick="showTab(2)" class="flex-1 py-3 tab-btn font-medium" id="tab2">❤️ 프로필</button>
        </div>

        <!-- 대화 탭 -->
        <div id="content0" class="flex-1 p-4 overflow-auto flex flex-col">
            <div id="chat" class="flex-1 overflow-auto space-y-4 mb-4"></div>
            <div class="flex gap-2">
                <input id="message" type="text" placeholder="무엇이든 물어봐..." 
                       class="flex-1 bg-zinc-900 border border-cyan-500/50 rounded-2xl px-5 py-3 focus:outline-none focus:border-cyan-400">
                <button onclick="sendMessage()" class="bg-cyan-500 hover:bg-cyan-400 px-6 rounded-2xl font-bold">전송</button>
            </div>
        </div>

        <!-- 게임 탭 -->
        <div id="content1" class="flex-1 hidden flex-col items-center justify-center p-4">
            <h2 class="text-xl mb-4">🚀 갤럭시 런</h2>
            <div id="gameArea" class="relative w-full max-w-xs h-80 border border-cyan-500/30 rounded-2xl">
                <div id="rocket" class="absolute left-1/2 text-6xl z-10" style="bottom: 250px; transition: bottom 0.05s linear;">🚀</div>
            </div>
            <p class="mt-4 text-lg">점수: <span id="score" class="font-bold text-yellow-400">0</span></p>
            <p class="text-xs opacity-70 mt-1">화면 터치하거나 스페이스바로 점프!</p>
            <button onclick="resetGame()" class="mt-6 bg-purple-600 px-8 py-3 rounded-2xl">다시 시작</button>
        </div>

        <!-- 프로필 탭 -->
        <div id="content2" class="flex-1 hidden p-4 space-y-6">
            <div>
                <label class="block text-sm mb-2">이름</label>
                <input id="myName" placeholder="이름을 입력하세요" class="w-full bg-zinc-900 border border-cyan-500/50 rounded-2xl px-5 py-3">
            </div>
            <div>
                <label class="block text-sm mb-2">한 줄 소개</label>
                <input id="bio" placeholder="우주를 좋아하는 사람" class="w-full bg-zinc-900 border border-cyan-500/50 rounded-2xl px-5 py-3">
            </div>
            <button onclick="saveProfile()" class="w-full bg-gradient-to-r from-purple-600 to-cyan-600 py-4 rounded-3xl font-bold">저장하기</button>
        </div>

        <div class="p-4 text-center text-xs opacity-60 border-t border-cyan-500/30">
            대화가 쌓일수록 더 똑똑해져요 • 42를 기억하세요 🧣
        </div>
    </div>

    <script>
        // 대화 부분 (그대로)
        let memory = JSON.parse(localStorage.getItem('companionMemory') || '[]');

        function showTab(n) {
            document.querySelectorAll('#content0, #content1, #content2').forEach(el => el.classList.add('hidden'));
            document.getElementById('content' + n).classList.remove('hidden');
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active', 'text-cyan-400'));
            document.getElementById('tab' + n).classList.add('active', 'text-cyan-400');
        }

        function addChat(text, isUser) {
            const chat = document.getElementById('chat');
            const bubble = document.createElement('div');
            bubble.className = `chat-bubble ${isUser ? 'ml-auto bg-cyan-600' : 'mr-auto bg-zinc-800'}`;
            bubble.textContent = text;
            chat.appendChild(bubble);
            chat.scrollTop = chat.scrollHeight;
        }

        function getReply(msg) {
            const lower = msg.toLowerCase();
            if (lower.includes("기억해") || lower.includes("저장")) {
                memory.push(msg);
                localStorage.setItem('companionMemory', JSON.stringify(memory));
                return "알았어. 메모리 코어에 안전하게 저장했어.";
            }
            if (lower.includes("안녕") || lower.includes("하이")) {
                return Math.random() > 0.5 ? "안녕! 오늘 기분 어때?" : "오랜만이야! 뭐 재미있는 일 있었어?";
            }
            if (lower.includes("42") || lower.includes("수건")) {
                return "42... 결국 모든 것의 답이지. 수건은 항상 챙겨 다니는 게 좋아 🧣";
            }
            const replies = [
                "그 생각 재미있네. 더 자세히 말해줄래?",
                "우주에서 보면 모든 게 조금 더 작아 보이더라.",
                "흥미로워. 계속 이야기 나눠보자.",
                "좋은 질문! 솔직하게 대답해볼게.",
                "42를 생각하면 마음이 편안해지더라. 너는 어때?"
            ];
            return replies[Math.floor(Math.random() * replies.length)];
        }

        function sendMessage() {
            const input = document.getElementById('message');
            const msg = input.value.trim();
            if (!msg) return;
            addChat(msg, true);
            input.value = '';

            setTimeout(() => {
                addChat(getReply(msg), false);
            }, 600);
        }

        // ==================== 게임 부분 (완전 새로 작성) ====================
        let score = 0;
        let gameRunning = false;
        let rocketY = 250;
        let velocity = 0;
        let obstacles = [];
        let lastTime = 0;
        let animationFrame = null;

        function startGame() {
            if (gameRunning) return;
            gameRunning = true;

            const area = document.getElementById('gameArea');
            const rocket = document.getElementById('rocket');
            
            score = 0;
            rocketY = 250;
            velocity = 0;
            obstacles = [];
            document.getElementById('score').textContent = '0';

            document.querySelectorAll('.obstacle').forEach(el => el.remove());

            lastTime = performance.now();
            gameLoop(lastTime);
        }

        function gameLoop(timestamp) {
            if (!gameRunning) return;

            const delta = timestamp - lastTime;
            lastTime = timestamp;

            // 로켓 물리
            velocity += 0.9;
            rocketY += velocity;
            if (rocketY > 370) rocketY = 370;
            if (rocketY < 40) rocketY = 40;

            document.getElementById('rocket').style.bottom = (400 - rocketY) + 'px';

            // 소행성 생성
            if (Math.random() < 0.035) {
                createObstacle();
            }

            // 소행성 이동 & 충돌
            for (let i = obstacles.length - 1; i >= 0; i--) {
                let obs = obstacles[i];
                let left = parseFloat(obs.style.left);
                left -= 4.5;
                obs.style.left = left + '%';

                if (left < -15) {
                    obs.remove();
                    obstacles.splice(i, 1);
                    score += 10;
                    document.getElementById('score').textContent = score;
                    continue;
                }

                if (left < 70 && left > 30 && Math.abs(rocketY - parseFloat(obs.style.bottom)) < 80) {
                    endGame();
                    return;
                }
            }

            animationFrame = requestAnimationFrame(gameLoop);
        }

        function createObstacle() {
            const area = document.getElementById('gameArea');
            const obs = document.createElement('div');
            obs.className = 'obstacle';
            obs.textContent = '☄️';
            obs.style.left = '100%';
            obs.style.bottom = (60 + Math.random() * 260) + 'px';
            area.appendChild(obs);
            obstacles.push(obs);
        }

        function endGame() {
            gameRunning = false;
            if (animationFrame) cancelAnimationFrame(animationFrame);
            alert(`게임 오버!\n최종 점수: ${score}점\n\n다시 도전할래?`);
        }

        function resetGame() {
            gameRunning = false;
            if (animationFrame) cancelAnimationFrame(animationFrame);
            document.querySelectorAll('.obstacle').forEach(el => el.remove());
            startGame();
        }

        function saveProfile() {
            const name = document.getElementById('myName').value.trim();
            alert(name ? `${name}님 프로필 저장 완료!` : "프로필 저장 완료!");
        }

        // 초기화
        window.onload = () => {
            showTab(0);
            addChat("안녕! 나는 우주에서 온 친구야. 편하게 이야기 나눠보자.", false);

            const gameTab = document.getElementById('tab1');
            gameTab.addEventListener('click', () => {
                setTimeout(startGame, 400);
            });

            // 터치 & 클릭 점프
            const gameArea = document.getElementById('gameArea');
            gameArea.addEventListener('touchstart', (e) => {
                e.preventDefault();
                if (gameRunning) velocity = -18;
            });
            gameArea.addEventListener('click', () => {
                if (gameRunning) velocity = -18;
            });

            // 키보드 점프
            document.addEventListener('keydown', (e) => {
                if (e.key === " " && gameRunning) {
                    e.preventDefault();
                    velocity = -18;
                }
            });
        };
    </script>
</body>
</html>
